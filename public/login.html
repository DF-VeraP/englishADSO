<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEAKSOFT | Iniciar Sesión</title>
    <meta name="description" content="Accede a la plataforma SPEAKSOFT">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-split-container">
        <!-- Contenedor vacío para simular la imagen del médico -->
        <div class="login-image-section">
            <div class="image-placeholder">
                <span class="placeholder-icon">🩺</span>
                <p>Imagen del Médico</p>
            </div>
        </div>

        <!-- Sección del Formulario -->
        <div class="login-form-section">
            <div class="login-card">
                <div class="login-header">
                    <h1 class="login-logo">SPEAKSOFT</h1>
                    <p class="login-subtitle">Bienvenido de nuevo. Por favor, ingresa a tu cuenta.</p>
                </div>

                <form id="loginForm" novalidate>
                    
                    <!-- Selector de Rol -->
                    <div class="role-selector">
                        <label class="role-option">
                            <input type="radio" name="role" value="aprendiz" checked>
                            <span class="role-btn">Aprendiz</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="instructor">
                            <span class="role-btn">Instructor</span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="admin">
                            <span class="role-btn">Admin</span>
                        </label>
                    </div>

                    <div class="form-group" id="emailGroup">
                        <label for="email" class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-input" placeholder="ejemplo@sena.edu.co" autocomplete="email" required>
                        <div class="error-message">Por favor ingresa un correo válido.</div>
                    </div>

                    <div class="form-group" id="passwordGroup">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
                        <div class="error-message">La contraseña es obligatoria (mín. 6 caracteres).</div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Recordarme
                        </label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary btn-submit">
                        <span class="btn-text">Iniciar Sesión</span>
                        <span class="loader"></span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/AuthService.js"></script>
    <script src="js/LoginController.js"></script>
</body>
</html>
